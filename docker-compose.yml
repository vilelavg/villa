# ═══════════════════════════════════════════════════════════════
# VILLA — Docker Compose
# Orquestra: app (FastAPI) + PostgreSQL + Redis + Nginx
# ═══════════════════════════════════════════════════════════════

services:

  # ── Villa App (FastAPI) ──
  villa-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: villa-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Hot reload em desenvolvimento
      - villa-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - villa-network
    # Comando de dev com hot reload (sobrescreve o CMD do Dockerfile)
    command: >
      uvicorn core.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/core
      --reload-dir /app/modules
      --reload-dir /app/integrations
      --reload-dir /app/api

  # ── PostgreSQL 16 + pgvector ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: villa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-villa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-villa_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-villa_db}
    ports:
      - "5432:5432"
    volumes:
      - villa-postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d  # Roda migrations no primeiro start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-villa} -d ${POSTGRES_DB:-villa_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - villa-network

  # ── Redis 7 (cache + filas) ──
  redis:
    image: redis:7-alpine
    container_name: villa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - villa-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - villa-network

  # ── Nginx (proxy reverso) ──
  # Ativar quando fizer deploy na nuvem com domínio/SSL
  # nginx:
  #   image: nginx:alpine
  #   container_name: villa-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./config/nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - villa-app
  #   networks:
  #     - villa-network

# ── Volumes persistentes ──
volumes:
  villa-postgres-data:
    driver: local
  villa-redis-data:
    driver: local
  villa-logs:
    driver: local

# ── Rede interna ──
networks:
  villa-network:
    driver: bridge
