# Villa — Configuração do Alembic
# Migrations de schema do banco. Sempre versionar mudanças via Alembic, nunca via SQLs soltos.

[alembic]
# Diretório onde ficam as migrations (.py com upgrade/downgrade)
script_location = db/migrations

# Caminho dos arquivos de versão
version_locations = %(here)s/db/migrations/versions

# Separador de versões no padrão de nome de arquivo
version_path_separator = os

# Codificação dos arquivos
output_encoding = utf-8

# URL do banco — NÃO definida aqui. Carregada de core.config.settings via env.py
# (mantemos centralizado no .env)
sqlalchemy.url =

# Formato do timestamp em revision IDs (opcional, melhora legibilidade)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncamento do slug (parte legível do nome do arquivo)
truncate_slug_length = 40


# ── Logging ───────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
